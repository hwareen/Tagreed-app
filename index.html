<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغريد | الفضاء النفسي الفخم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <div class="avatar-box">
                    <span class="status-indicator"></span>
                    <img src="https://ui-avatars.com" alt="Tagreed">
                </div>
                <div class="brand-text">
                    <h1>تغريد</h1>
                    <p>أخصائية نفسية ذكية</p>
                </div>
            </div>
            <a href="tel:+9665XXXXXXXX" class="emergency-call">طوارئ 🆘</a>
        </header>

        <main id="chat-box" class="chat-content">
            <div class="msg tagreed">أهلاً بك.. أنا تغريد. أخبرني باسمك الأول وكيف تشعر الآن؟</div>
        </main>

        <footer class="input-area">
            <div class="input-group">
                <input type="text" id="user-msg" placeholder="اكتب مشاعرك هنا..." autocomplete="off">
                <button id="send-btn">➤</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
