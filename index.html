<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغريد | الفضاء الزجاجي الآمن</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-text: #1a2a2a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية متحركة متدرجة */
            background: linear-gradient(-45deg, #e3f2fd, #f1f8e9, #e0f2f1, #fce4ec);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-container {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* تأثير الزجاج */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        header h1 { 
            margin: 0; 
            font-size: 28px; /* خط كبير */
            color: var(--primary-text); 
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 85%;
            padding: 18px 25px;
            font-size: 18px; /* حجم خط كبير للمتحدث */
            border-radius: 25px;
            line-height: 1.6;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tagreed {
            background: rgba(255, 255, 255, 0.5);
            align-self: flex-start;
            color: var(--primary-text);
            border-bottom-right-radius: 5px;
        }

        .user {
            background: rgba(74, 124, 122, 0.8);
            color: white;
            align-self: flex-end;
            border-bottom-left-radius: 5px;
        }

        .input-bar {
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 18px;
            outline: none;
            font-family: 'Cairo';
        }

        #send-btn {
            background: #4A7C7A;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }

        .emergency-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            background: rgba(230, 57, 70, 0.2);
            color: #e63946;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<a href="tel:+9665XXXXXXXX" class="emergency-link">طوارئ 🆘</a>

<div id="app-container">
    <header>
        <h1>تغريد ✨</h1>
        <small>معكِ بكل هدوء</small>
    </header>

    <div id="chat-window">
        <div class="bubble tagreed">أهلاً بكِ في مساحتكِ الزجاجية الآمنة.. أنا تغريد، كيف تشعرين الآن؟</div>
    </div>

    <div class="input-bar">
        <input type="text" id="user-input" placeholder="اكتبي ما تشعرين به..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const apiKey = "ضع_مفتاح_OpenAI_هنا"; 

    let history = [
        { role: "system", content: "أنتِ تغريد، أخصائية نفسية دافئة. تحدثي بالعربية بأسلوب هادئ وخطوط واضحة. كوني متعاطفة جداً." }
    ];

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text || apiKey.includes("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")) return;

        addBubble(text, 'user');
        history.push({ role: "user", content: text });
        input.value = "";

        const loading = addBubble("تغريد تفكر بعمق...", 'tagreed');

        try {
            const response = await fetch('https://openai.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "gpt-4o-mini", messages: history })
            });
            const data = await response.json();
            loading.remove();
            const reply = data.choices[0].message.content;
            addBubble(reply, 'tagreed');
            history.push({ role: "assistant", content: reply });
        } catch (e) {
            loading.innerText = "أنا هنا لأسمعك، تأكدي من الاتصال بالإنترنت.";
        }
    }

    function addBubble(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }
</script>

</body>
</html>
