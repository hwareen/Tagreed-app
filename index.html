<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغريد |  النفسي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="profile">
                <div class="avatar">
                    <span class="pulse"></span>
                    <img src="https://ui-avatars.com" alt="Tagreed">
                </div>
                <div class="info">
                    <h1>تغريد</h1>
                    <p>أخصائية نفسية ذكية</p>
                </div>
            </div>
            <a href="tel:0599151681" class="btn-emergency">مساعدة عاجلة</a>
        </header>

        <main id="chat-viewport" class="chat-viewport">
            <div class="bubble tagreed">أهلاً بك.. أنا تغريد. أخبرني باسمك وما الذي تشعر به الآن؟</div>
        </main>

        <footer class="input-section">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="تحدث مع تغريد هنا..." autocomplete="off">
                <button id="send-trigger">➤</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
